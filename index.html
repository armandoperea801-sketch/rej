<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Realtime - Todo en Uno</title>
    
    <style>
        /* CSS: Estilos y Diseño */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #e5ddd5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; transition: all 0.3s ease; }
        .hidden { display: none !important; }

        /* Login */
        #login-screen h1 { color: #075e54; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; border: none; background: #25d366; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background: #128c7e; }

        /* Chat */
        #chat-screen { display: flex; flex-direction: column; height: 80vh; padding: 10px; }
        #chat-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 10px; background: #f9f9f9; border-radius: 10px; margin: 10px 0; display: flex; flex-direction: column; gap: 8px; }
        
        .msg { padding: 8px 12px; border-radius: 10px; font-size: 14px; max-width: 75%; word-wrap: break-word; position: relative; }
        .msg span { font-size: 10px; display: block; color: #666; margin-bottom: 3px; }
        .me { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 0; }
        .others { background: white; align-self: flex-start; border-bottom-left-radius: 0; border: 1px solid #eee; }

        .input-area { display: flex; gap: 10px; }
        #message-input { margin: 0; flex-grow: 1; }
        #send-btn { width: auto; padding: 0 20px; }
    </style>
</head>
<body>

    <div id="login-screen" class="container">
        <h1>Chat App</h1>
        <p>Introduce tu alias para comenzar</p>
        <input type="text" id="username" placeholder="Ej: Juan Pérez...">
        <button id="login-btn">Entrar al Chat</button>
    </div>

    <div id="chat-screen" class="container hidden">
        <div id="chat-header">
            <strong id="display-name">Usuario</strong>
            <button id="logout-btn" style="width: auto; padding: 5px 10px; background: #ff5f56;">Salir</button>
        </div>
        <div id="chat-box">
            </div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="Escribe un mensaje...">
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script type="module">
        // Importamos Firebase (Versión CDN ligera)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURACIÓN DE TU BASE DE DATOS (Debes crear un proyecto en Firebase y pegar esto aquí)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO_ID",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const messagesCol = collection(db, "mensajes");

        // Variables de control
        let currentUser = "";
        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const chatBox = document.getElementById('chat-box');

        // Función Entrar
        document.getElementById('login-btn').onclick = () => {
            const name = document.getElementById('username').value.trim();
            if (name) {
                currentUser = name;
                document.getElementById('display-name').innerText = currentUser;
                loginScreen.classList.add('hidden');
                chatScreen.classList.remove('hidden');
                cargarMensajes();
            }
        };

        // Función Enviar Mensaje a la Base de Datos
        async function enviarMensaje() {
            const input = document.getElementById('message-input');
            if (input.value.trim() !== "") {
                try {
                    await addDoc(messagesCol, {
                        user: currentUser,
                        text: input.value,
                        time: serverTimestamp()
                    });
                    input.value = "";
                } catch (e) { console.error("Error al guardar: ", e); }
            }
        }

        document.getElementById('send-btn').onclick = enviarMensaje;
        document.getElementById('message-input').onkeypress = (e) => { if(e.key === 'Enter') enviarMensaje(); };

        // Escuchar cambios en la base de datos en tiempo real
        function cargarMensajes() {
            const q = query(messagesCol, orderBy("time", "asc"));
            onSnapshot(q, (snapshot) => {
                chatBox.innerHTML = ""; // Limpiar para recargar
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    div.classList.add('msg');
                    div.classList.add(data.user === currentUser ? 'me' : 'others');
                    div.innerHTML = `<span>${data.user}</span>${data.text}`;
                    chatBox.appendChild(div);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        document.getElementById('logout-btn').onclick = () => location.reload();

    </script>
</body>
</html>
